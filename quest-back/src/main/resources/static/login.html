<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Quest RPG 로그인</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      width: 350px;
      background: #161c2e;
      padding: 30px;
      border-radius: 20px;
    }

    h2 {
      margin-top: 0;
    }

    input[type=email],
    input[type=password] {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .remember {
      margin-bottom: 15px;
    }
  </style>

</head>

<body>

  <div class="login-box">

    <h2>Quest RPG 로그인</h2>

    <input id="email" type="email" placeholder="이메일">

    <input id="password" type="password" placeholder="비밀번호">

    <div class="remember">
      <label>
        <input id="rememberMe" type="checkbox">
        자동 로그인 (30일 유지)
      </label>
    </div>

    <button onclick="login()">
      로그인
    </button>

  </div>

  <script>

    window.onload = async () => {

      try {

        const res =
          await fetch('/api/auth/check');

        if (res.ok) {

          location.href = '/main';
        }

      } catch (e) {
        console.error(e);
      }
    };

    async function login() {

      const email =
        document.getElementById('email').value;

      const password =
        document.getElementById('password').value;

      const rememberMe =
        document.getElementById('rememberMe').checked;

      try {

        const res =
          await fetch('/api/auth/login', {

            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              email,
              password,
              rememberMe
            })
          });

        const data =
          await res.json();

        if (!res.ok) {

          alert(data.message);
          return;
        }

        location.href = '/main';

      } catch (e) {

        alert('서버 연결 실패');
      }
    }

  </script>

</body>

</html>
