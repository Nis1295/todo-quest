spring.application.name=quest
# DB 연결
spring.datasource.url=jdbc:mysql://localhost:3306/quest?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=org.cloud
mybatis.configuration.map-underscore-to-camel-case=true

# 로그
logging.level.com.quest=DEBUG


spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
